<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – Bold</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: var(--gray-50); min-height: 100vh; display: flex; flex-direction: column; }

    /* ---- Minimal nav ---- */
    .auth-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
    }

    /* ---- Layout ---- */
    .auth-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--gray-200);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }

    /* ---- Header ---- */
    .auth-logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .auth-title { font-size: 22px; font-weight: 800; color: var(--gray-900); text-align: center; margin-bottom: 6px; letter-spacing: -.3px; }
    .auth-sub   { font-size: 14px; color: var(--gray-500); text-align: center; margin-bottom: 28px; }

    /* ---- Social ---- */
    .social-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 12px 16px;
      background: var(--white); border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      color: var(--gray-800); cursor: pointer; transition: all .15s;
      margin-bottom: 10px; font-family: var(--font);
    }
    .social-btn:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .social-btn svg { flex-shrink: 0; }

    /* ---- Bottom link ---- */
    .auth-footer-link {
      text-align: center;
      font-size: 13px;
      color: var(--gray-500);
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--gray-100);
    }
    .auth-footer-link a { color: var(--purple); font-weight: 600; }

    /* ---- Logo ---- */
    .auth-logo {
      position: relative; width: 75px; height: 22px;
      flex-shrink: 0; text-decoration: none; display: block; overflow: hidden;
    }
    .auth-logo-wrap .auth-logo { width: 90px; height: 27px; }
    .auth-logo .logo-lines {
      position: absolute; top: 0; left: 0; right: 70%; bottom: 0;
    }
    .auth-logo .logo-text {
      position: absolute; top: 20%; left: 36%; right: 0; bottom: 20%;
    }
    .auth-logo .logo-lines img,
    .auth-logo .logo-text img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; max-width: none; object-fit: contain;
    }

    /* ---- Reveal toggle ---- */
    .input-reveal { position: relative; }
    .input-reveal input { padding-right: 44px; }
    .reveal-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--gray-400); cursor: pointer;
      font-size: 16px; padding: 0; line-height: 1;
    }

    /* ---- Trust strip ---- */
    .trust-strip {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-top: 20px; padding-top: 16px;
    }
    .trust-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray-400); font-weight: 500; }

    /* ---- Error ---- */
    .err-banner {
      background: var(--red-light); border: 1px solid #FECACA; color: var(--red);
      border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .err-banner.show { display: block; }

    /* steps */
    .step { display: none; }
    .step.active { display: block; }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="auth-nav">
  <a href="index.html" class="auth-logo">
    <div class="logo-lines"><img src="auth-logo-lines.svg" alt="" /></div>
    <div class="logo-text"><img src="auth-logo-text.svg" alt="BOLD" /></div>
  </a>
  <a href="check-eligibility.html" style="font-size:13px;color:var(--gray-500)">
    New here? <span style="color:var(--purple);font-weight:600">Sign up</span>
  </a>
</nav>

<!-- Card -->
<div class="auth-body">
  <div class="auth-card">

    <!-- Step 1: Email -->
    <div class="step active" id="s-email">
      <div class="auth-logo-wrap">
        <a href="index.html" class="auth-logo">
          <div class="logo-lines"><img src="auth-logo-lines.svg" alt="" /></div>
          <div class="logo-text"><img src="auth-logo-text.svg" alt="BOLD" /></div>
        </a>
      </div>
      <h1 class="auth-title">Sign in to Bold</h1>
      <p class="auth-sub">Welcome back!</p>

      <button class="social-btn" onclick="socialLogin('Google')">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <button class="social-btn" onclick="socialLogin('Facebook')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Continue with Facebook
      </button>

      <div class="divider">or</div>

      <div class="err-banner" id="email-err">Please enter a valid email address.</div>

      <form onsubmit="goToPassword(event)">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-purple btn-full">Continue</button>
      </form>

      <div class="auth-footer-link">
        Don't have an account? <a href="check-eligibility.html">Check eligibility</a>
      </div>
    </div>

    <!-- Step 2: Password -->
    <div class="step" id="s-pw">
      <div class="auth-logo-wrap">
        <a href="index.html" class="auth-logo">
          <div class="logo-lines"><img src="auth-logo-lines.svg" alt="" /></div>
          <div class="logo-text"><img src="auth-logo-text.svg" alt="BOLD" /></div>
        </a>
      </div>
      <h1 class="auth-title">Welcome back!</h1>
      <p class="auth-sub" id="pw-email-label">—</p>

      <div class="err-banner" id="pw-err">Incorrect password. Please try again.</div>

      <form onsubmit="doSignIn(event)">
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-reveal">
            <input class="form-input" type="password" id="pw-input" placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="reveal-toggle" onclick="togglePw('pw-input')">👁</button>
          </div>
        </div>
        <div style="text-align:right;margin:-6px 0 16px">
          <a href="#" style="font-size:13px;color:var(--purple);font-weight:500">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-purple btn-full">Sign in</button>
      </form>

      <div style="text-align:center;margin-top:16px">
        <button onclick="showStep('s-email')" style="background:none;border:none;font-size:13px;color:var(--gray-400);cursor:pointer">← Use a different email</button>
      </div>
    </div>

    <!-- Trust -->
    <div class="trust-strip">
      <span class="trust-item">🔒 Encrypted</span>
      <span class="trust-item">🏥 HIPAA compliant</span>
    </div>

  </div>
</div>

<script>
  function showStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goToPassword(e) {
    e.preventDefault();
    const email = document.getElementById('email-input').value.trim();
    const err   = document.getElementById('email-err');
    if (!email || !email.includes('@')) {
      document.getElementById('email-input').classList.add('has-error');
      err.classList.add('show');
      return;
    }
    err.classList.remove('show');
    document.getElementById('email-input').classList.remove('has-error');
    document.getElementById('pw-email-label').textContent = 'Signing in as ' + email;
    showStep('s-pw');
  }

  function doSignIn(e) {
    e.preventDefault();
    const pw = document.getElementById('pw-input').value;
    if (!pw) {
      document.getElementById('pw-input').classList.add('has-error');
      document.getElementById('pw-err').classList.add('show');
      return;
    }
    // Demo: any password proceeds
    window.location.href = 'today-plan.html';
  }

  function togglePw(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function socialLogin(p) { alert('Demo: ' + p + ' OAuth flow'); }
</script>
</body>
</html>
