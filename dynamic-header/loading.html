<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creating your plan – Bold</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font, 'Inter', sans-serif);
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .ld-nav {
      background: #fff;
      box-shadow: 0 1px 3px rgba(16,24,40,.10), 0 1px 2px rgba(16,24,40,.06);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .ld-logo {
      height: 22px; width: 75px;
      position: relative; flex-shrink: 0; display: block; overflow: hidden;
    }
    .ld-logo .logo-lines { position: absolute; top: 0; left: 0; right: 70%; bottom: 0; }
    .ld-logo .logo-text  { position: absolute; top: 20%; left: 36%; right: 0; bottom: 20%; }
    .ld-logo .logo-lines img,
    .ld-logo .logo-text img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; max-width: none; object-fit: contain;
    }
    .ld-nav-label {
      font-size: 16px; font-weight: 600;
      color: #115e59; letter-spacing: -0.16px;
    }

    /* ── Content ── */
    .ld-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px;
    }
    .ld-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 40px;
      width: 100%;
      max-width: 519px;
    }

    /* ── Dots animation ── */
    .ld-dots {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      height: 56px;
      align-self: center;
    }
    .ld-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      animation: ld-bounce 1.4s ease-in-out infinite;
    }
    .ld-dot:nth-child(1) { background: #5200d4; animation-delay: 0s; }
    .ld-dot:nth-child(2) { background: #3366ff; animation-delay: 0.18s; }
    .ld-dot:nth-child(3) { background: #ffcc1b; animation-delay: 0.36s; }
    .ld-dot:nth-child(4) { background: #80e8ff; animation-delay: 0.54s; }

    @keyframes ld-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-22px); }
    }

    /* ── Text block ── */
    .ld-text { display: flex; flex-direction: column; gap: 24px; width: 100%; }
    .ld-title {
      font-size: 28px; font-weight: 600;
      color: #140d26; line-height: 1.21;
      letter-spacing: -0.28px;
    }

    /* ── Checklist ── */
    .ld-checks {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .ld-check-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ld-check-row svg { flex-shrink: 0; }
    .ld-check-row span {
      font-size: 18px; font-weight: 600;
      color: #000; line-height: 1.4;
    }
  </style>
</head>
<body>

<nav class="ld-nav">
  <a href="index.html" class="ld-logo">
    <div class="logo-lines"><img src="assets/logos/results-logo-lines.svg" alt="" /></div>
    <div class="logo-text"><img src="assets/logos/results-logo-text.svg" alt="BOLD" /></div>
  </a>
  <span class="ld-nav-label">Your results</span>
</nav>

<div class="ld-body">
  <div class="ld-card">

    <div class="ld-dots">
      <div class="ld-dot"></div>
      <div class="ld-dot"></div>
      <div class="ld-dot"></div>
      <div class="ld-dot"></div>
    </div>

    <div class="ld-text">
      <h1 class="ld-title">Creating your personalized plan</h1>
      <div class="ld-checks" id="ld-checks"></div>
    </div>

  </div>
</div>

<script src="assets/js/ai-coach.js"></script>
<script>
  const FOCUS_LABELS = {
    balance:       'Strengthen balance & stability',
    pain:          'Manage pain',
    routine_new:   'Add to my exercise routine',
    routine_start: 'Start an exercise routine',
    pelvic:        'Improve pelvic health',
    brain:         'Enhance brain health',
  };

  const DURATION_LABELS = {
    '10 minutes': '10 min sessions',
    '20 minutes': '20 min sessions',
    '30 minutes': '30 min sessions',
    '45+ minutes': '45+ min sessions',
  };

  const POSITION_LABELS = {
    seated:   'Preference for seated work',
    standing: 'Preference for standing work',
    floor:    'Comfortable with floor exercises',
    any:      'Comfortable with all positions',
  };

  const INTENSITY_LABELS = {
    gentle:      'Gentle intensity',
    moderate:    'Moderate intensity',
    challenging: 'Challenging intensity',
  };

  // Build checklist from localStorage answers
  const focus     = JSON.parse(localStorage.getItem('boldFocus') || '[]');
  const prim      = localStorage.getItem('boldPrimaryFocus') || focus[0] || 'balance';
  const duration  = localStorage.getItem('boldDuration') || '';
  const intensity = localStorage.getItem('boldIntensity') || '';
  const positions = JSON.parse(localStorage.getItem('boldPosition') || '[]');
  const accom     = localStorage.getItem('boldAccommodations') || '';
  const painArea  = JSON.parse(localStorage.getItem('boldPainArea') || '[]');

  const items = [];
  if (prim) items.push(FOCUS_LABELS[prim] || prim);
  if (accom) items.push(accom.length > 50 ? accom.slice(0, 49) + '…' : accom);
  else if (painArea.length) items.push(painArea.map(a => a.replace('_',' ')).join(', ') + ' pain noted');
  const pos = positions[0];
  if (pos) items.push(POSITION_LABELS[pos] || pos);
  if (duration) items.push(DURATION_LABELS[duration] || duration);

  const container = document.getElementById('ld-checks');
  container.innerHTML = items.map(text => `
    <div class="ld-check-row">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" stroke="#171717" stroke-width="1.5"/>
        <path d="M7.5 12l3 3 6-6" stroke="#171717" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>${text}</span>
    </div>`).join('');

  // Fire AI calls in background, store results, then redirect
  (async () => {
    try {
      const [bullets, ctx] = await Promise.all([
        generatePlanBullets(),
        Promise.resolve(getBoldContext()),
      ]);
      const msg = await generateCoachMessage(ctx);

      if (bullets) localStorage.setItem('boldAIBullets', JSON.stringify(bullets));
      if (msg)     localStorage.setItem('boldAIMessage', JSON.stringify(msg));
    } catch (e) {
      console.warn('Bold AI loading:', e);
    }
    window.location.href = 'program-results.html';
  })();
</script>

</body>
</html>
