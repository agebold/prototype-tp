<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Sort – Bold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      color: #171717;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .nav {
      background: #fff;
      box-shadow: 0 1px 3px rgba(16,24,40,0.1), 0 1px 2px rgba(16,24,40,0.06);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 20;
      gap: 16px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-logo-lines {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .nav-logo-text {
      width: 60px;
      height: 17px;
      flex-shrink: 0;
    }
    .nav-back {
      margin-left: 20px;
      font-size: 13px;
      color: #525252;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .nav-back:hover { background: #f5f5f5; }
    .nav-title {
      margin-left: auto;
      font-size: 13px;
      font-weight: 500;
      color: #737373;
    }

    /* ── Layout ── */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Buttons ── */
    button { font-family: 'Inter', sans-serif; }
    .btn-primary {
      background: #1B6B5A;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #155549; }
    .btn-secondary {
      background: transparent;
      border: 0.5px solid #d4d4d4;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      cursor: pointer;
      color: #525252;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn-sm-green {
      background: #1B6B5A;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-sm-green:hover { background: #155549; }
    .btn-sm-purple {
      background: #EEEDFE;
      color: #534AB7;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-sm-purple:hover { background: #e0dffe; }

    /* ── Group drop zone ── */
    .group-drop {
      background: #ffffff;
      border: 0.5px solid #e5e5e5;
      border-radius: 12px;
      overflow: hidden;
      min-height: 80px;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .group-drop.drag-over {
      border-color: #1B6B5A;
      box-shadow: 0 0 0 2px rgba(27,107,90,0.15);
    }

    /* ── Card ── */
    .card-unsorted {
      background: #ffffff;
      border: 0.5px solid #e5e5e5;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #171717;
      cursor: grab;
      user-select: none;
      max-width: 240px;
      line-height: 1.4;
      transition: border-color 0.1s, box-shadow 0.1s, opacity 0.1s;
    }
    .card-unsorted:active { cursor: grabbing; }
    .card-unsorted.is-dragging {
      opacity: 0.5;
      border-color: #1B6B5A;
    }
    .card-sorted {
      background: #E1F5EE;
      border: 0.5px solid #9FE1CB;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      color: #0F6E56;
      cursor: grab;
      user-select: none;
      width: 100%;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      transition: opacity 0.1s;
    }
    .card-sorted:active { cursor: grabbing; }
    .card-sorted.is-dragging { opacity: 0.5; }
    .card-remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 10px;
      opacity: 0.5;
      padding: 0;
      color: #0F6E56;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-remove-btn:hover { opacity: 1; }

    /* ── Group header ── */
    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 0.5px solid #e5e5e5;
      background: #f5f5f5;
    }
    .group-name-display {
      font-size: 14px;
      font-weight: 500;
      color: #171717;
      cursor: text;
      flex: 1;
    }
    .group-name-input {
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: #171717;
      outline: none;
      width: 100%;
      font-family: 'Inter', sans-serif;
    }
    .group-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .group-count {
      font-size: 11px;
      color: #737373;
    }
    .group-delete-btn {
      background: none;
      border: none;
      color: #737373;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      transition: background 0.1s, color 0.1s;
    }
    .group-delete-btn:hover { background: #e5e5e5; color: #171717; }

    .group-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 44px;
    }
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .group-drag-handle {
      cursor: grab;
      color: #d4d4d4;
      font-size: 15px;
      line-height: 1;
      padding: 0 6px 0 0;
      flex-shrink: 0;
      user-select: none;
      display: flex;
      align-items: center;
    }
    .group-drag-handle:hover { color: #737373; }
    .group-drag-handle:active { cursor: grabbing; }
    .group-collapse-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #737373;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      font-size: 10px;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .group-collapse-btn:hover { background: #e5e5e5; color: #171717; }
    .group-drop.group-dragging { opacity: 0.45; }
    .group-drop.is-group-drag-over {
      border-color: #185FA5;
      box-shadow: 0 0 0 2px rgba(24,95,165,0.2);
    }
    .group-empty-hint {
      font-size: 12px;
      color: #737373;
      padding: 8px;
      font-style: italic;
      pointer-events: none;
    }

    /* ── Intro info box ── */
    .info-box {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #525252;
      line-height: 1.6;
    }

    /* ── Results ── */
    .result-group {
      margin-bottom: 20px;
      background: #ffffff;
      border: 0.5px solid #e5e5e5;
      border-radius: 12px;
      overflow: hidden;
    }
    .result-group-header {
      background: #1B6B5A;
      padding: 10px 16px;
      color: #fff;
      font-weight: 500;
      font-size: 14px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 0.5px solid #e5e5e5;
      font-size: 13px;
    }
    .result-row:last-child { border-bottom: none; }
    .result-hypothesis {
      font-size: 11px;
      color: #888;
      margin-left: 12px;
      text-align: right;
      min-width: 120px;
      flex-shrink: 0;
    }

    /* ── Card drop indicator ── */
    .card-sorted.drop-above { border-top: 2px solid #1B6B5A; }
    .card-sorted.drop-below { border-bottom: 2px solid #1B6B5A; }

    /* ── Export button ── */
    .btn-export {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
      padding: 8px 14px; font-size: 12px; font-weight: 500; color: #525252;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-export:hover { background: #f5f5f5; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #737373;
      font-size: 13px;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: #e5e5e5;
      border-radius: 4px;
      height: 4px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #1B6B5A;
      border-radius: 4px;
      transition: width 0.3s;
    }
  </style>
</head>

<script>
const CARDS_DATA = [
  { id: 1,  text: "Start my recommended exercise class for today" },
  { id: 2,  text: "Watch an educational video about joint health" },
  { id: 3,  text: "Tell Bold how I'm feeling this week" },
  { id: 4,  text: "Log what I ate for lunch" },
  { id: 5,  text: "Browse all available exercise classes" },
  { id: 6,  text: "Find a yoga class I can do seated" },
  { id: 7,  text: "See what live classes are happening this week" },
  { id: 8,  text: "Read an article about managing knee pain" },
  { id: 9,  text: "Listen to a guided relaxation audio" },
  { id: 10, text: "Search for a specific class or topic" },
  { id: 11, text: "See how my balance has improved over time" },
  { id: 12, text: "See what exercise focus I'm working on right now" },
  { id: 13, text: "Look at which classes I've completed" },
  { id: 14, text: "Find a class I saved to do again later" },
  { id: 15, text: "See how many days I've been active this month" },
  { id: 16, text: "Message my doctor about my hip pain" },
  { id: 17, text: "Schedule a telehealth appointment" },
  { id: 18, text: "Join my upcoming video appointment with my doctor" },
  { id: 19, text: "See my care plan and treatment goals" },
  { id: 20, text: "Learn what care services Bold offers" },
  { id: 21, text: "See my past appointments with my doctor" },
  { id: 22, text: "Change my exercise preferences (seated, standing, time of day)" },
  { id: 23, text: "Turn off reminder notifications" },
  { id: 24, text: "Check what my insurance covers" },
  { id: 25, text: "Connect my Apple Watch or Fitbit data" },
  { id: 26, text: "See a summary of my overall plan and where I'm headed" },
  { id: 27, text: "Find out why Bold recommended today's class for me" },
  { id: 28, text: "Switch to an easier class because I'm sore today" },
];

const HYPOTHESIS = {
  1: "Today", 2: "Today / Discover", 3: "Today", 4: "Today",
  5: "Discover", 6: "Discover", 7: "Discover", 8: "Discover / Today",
  9: "Discover", 10: "Discover", 11: "My Journey / Bold Care",
  12: "My Journey / Bold Care", 13: "My Journey / Bold Care",
  14: "My Journey / Discover", 15: "My Journey / Bold Care",
  16: "Bold Care", 17: "Bold Care", 18: "Bold Care / Today",
  19: "Bold Care", 20: "Bold Care / Discover", 21: "Bold Care",
  22: "Profile", 23: "Profile", 24: "Profile", 25: "Profile",
  26: "My Journey / Bold Care", 27: "Today", 28: "Today",
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Application state ──────────────────────────────────────────────
const state = {
  phase: 'intro',        // 'intro' | 'sort' | 'results'
  cards: shuffle(CARDS_DATA),
  groups: [],
  editingGroupId: null,
  addingCard: false,
  editingCardId: null,
};

// Module-level drag variables (no re-render on dragover)
let dragCardId = null;
let dragGroupId = null;
let dragOverCardId = null; // for in-group reorder indicator

// ── State helpers ──────────────────────────────────────────────────
function addGroup() {
  const newGroup = { id: Date.now(), name: 'Untitled group', cards: [], collapsed: false };
  state.groups.push(newGroup);
  state.editingGroupId = newGroup.id;
  render();
  // Focus the newly created input
  const input = document.querySelector('.group-name-input');
  if (input) input.focus();
}

function renameGroup(gid, name) {
  const g = state.groups.find(g => g.id === gid);
  if (g) g.name = name;
}

function saveGroupName(gid) {
  state.editingGroupId = null;
  render();
}

function moveCardToGroup(cardId, groupId) {
  // Find the card wherever it is
  let card = state.cards.find(c => c.id === cardId);
  if (!card) {
    for (const g of state.groups) {
      card = g.cards.find(c => c.id === cardId);
      if (card) break;
    }
  }
  if (!card) return;

  // Remove from unsorted pile
  state.cards = state.cards.filter(c => c.id !== cardId);

  // Remove from any group
  for (const g of state.groups) {
    g.cards = g.cards.filter(c => c.id !== cardId);
  }

  // Add to target group (avoid duplicates)
  const target = state.groups.find(g => g.id === groupId);
  if (target && !target.cards.find(c => c.id === cardId)) {
    target.cards.push(card);
  }
}

function moveCardBack(cardId) {
  let card = null;
  for (const g of state.groups) {
    const found = g.cards.find(c => c.id === cardId);
    if (found) { card = found; g.cards = g.cards.filter(c => c.id !== cardId); break; }
  }
  if (card) state.cards.push(card);
  render();
}

function addCustomCard(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  state.cards.push({ id: Date.now(), text: trimmed, custom: true });
  state.addingCard = false;
  render();
}

function deleteCustomCard(cardId) {
  // Remove from unsorted pile or any group
  state.cards = state.cards.filter(c => c.id !== cardId);
  for (const g of state.groups) g.cards = g.cards.filter(c => c.id !== cardId);
  render();
}

function saveCardEdit(cardId, text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  // Update wherever the card lives
  const inPile = state.cards.find(c => c.id === cardId);
  if (inPile) { inPile.text = trimmed; }
  else {
    for (const g of state.groups) {
      const c = g.cards.find(c => c.id === cardId);
      if (c) { c.text = trimmed; break; }
    }
  }
  state.editingCardId = null;
  render();
}

function toggleGroupCollapse(gid) {
  const g = state.groups.find(g => g.id === gid);
  if (g) g.collapsed = !g.collapsed;
  render();
}

function reorderCardInGroup(groupId, fromCardId, toCardId) {
  const group = state.groups.find(g => g.id === groupId);
  if (!group) return;
  const fromIdx = group.cards.findIndex(c => c.id === fromCardId);
  const toIdx   = group.cards.findIndex(c => c.id === toCardId);
  if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
  const [card] = group.cards.splice(fromIdx, 1);
  group.cards.splice(toIdx, 0, card);
}

function reorderGroup(fromId, toId) {
  if (fromId === toId) return;
  const fromIdx = state.groups.findIndex(g => g.id === fromId);
  const toIdx   = state.groups.findIndex(g => g.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [group] = state.groups.splice(fromIdx, 1);
  state.groups.splice(toIdx, 0, group);
}

function removeGroup(gid) {
  const group = state.groups.find(g => g.id === gid);
  if (group) {
    state.cards.push(...group.cards);
    state.groups = state.groups.filter(g => g.id !== gid);
  }
  render();
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  if (state.phase === 'intro') {
    app.innerHTML = renderIntro();
  } else if (state.phase === 'results') {
    app.innerHTML = renderResults();
  } else {
    app.innerHTML = renderSort();
  }

  attachEvents();

  // If editing a group name, focus the input
  if (state.editingGroupId !== null) {
    const input = document.querySelector('.group-name-input');
    if (input) input.focus();
  }
}

function renderIntro() {
  return `
    <div style="max-width:640px;margin:0 auto;padding-top:8px;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#1B6B5A;font-weight:500;margin-bottom:8px;">
        Age Bold — Card sort exercise
      </div>
      <h2 style="font-size:22px;font-weight:500;color:#171717;margin-bottom:12px;">
        Open card sort
      </h2>
      <p style="font-size:14px;color:#525252;line-height:1.6;margin-bottom:20px;">
        Imagine you're using a health and wellness app designed for adults 65 and older.
        Below are 28 things you might want to do in the app.
      </p>
      <p style="font-size:14px;color:#525252;line-height:1.6;margin-bottom:20px;">
        Your job is to <strong style="color:#171717;">sort these cards into groups that make sense to you</strong>,
        then give each group a name. There are no right or wrong answers — we want to understand how you think about these activities.
      </p>
      <div class="info-box">
        <strong style="color:#171717;">How it works:</strong><br>
        1. Create groups using the "Add group" button<br>
        2. Name each group something meaningful to you<br>
        3. Drag cards from the unsorted pile into your groups<br>
        4. When all cards are sorted, review your results
      </div>
      <button class="btn-primary" id="btn-start">Start sorting</button>
    </div>
  `;
}

function renderResults() {
  const groupsHtml = state.groups.map(g => `
    <div class="result-group">
      <div class="result-group-header">${escHtml(g.name)}</div>
      ${g.cards.map(c => `
        <div class="result-row">
          <span style="color:#171717;flex:1;">${escHtml(c.text)}</span>
          <span class="result-hypothesis">Hypothesis: ${escHtml(HYPOTHESIS[c.id] || '—')}</span>
        </div>
      `).join('')}
      ${g.cards.length === 0 ? '<div class="result-row" style="color:#737373;font-style:italic;">No cards in this group</div>' : ''}
    </div>
  `).join('');

  return `
    <div style="padding-top:8px;" id="export-target">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#1B6B5A;font-weight:500;margin-bottom:4px;">Card sort results</div>
          <h2 style="font-size:20px;font-weight:500;color:#171717;">Your groups vs. proposed IA</h2>
        </div>
        <button class="btn-export" id="btn-export">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M3.5 5.5l3 3 3-3M1.5 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Export as image
        </button>
      </div>
      ${groupsHtml}
      <button class="btn-secondary" id="btn-reset">Reset and try again</button>
    </div>
  `;
}

function exportAsImage() {
  const target = document.getElementById('export-target') || document.getElementById('app');
  html2canvas(target, { scale: 2, backgroundColor: '#f5f5f5', useCORS: true }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'card-sort-results.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

function renderSort() {
  const totalPlaced = state.groups.reduce((sum, g) => sum + g.cards.length, 0);
  const totalCards = state.cards.length + totalPlaced;
  const sorted = state.cards.length === 0 && state.groups.length > 0;
  const pct = totalCards > 0 ? Math.round((totalPlaced / totalCards) * 100) : 0;

  const addCardForm = state.addingCard ? `
    <div style="display:flex;gap:6px;align-items:center;margin-top:8px;">
      <input id="new-card-input" type="text" placeholder="Describe what you'd do…"
        style="flex:1;border:1.5px solid #1B6B5A;border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:#171717;background:#fff;" />
      <button class="btn-sm-green" id="btn-save-card">Add</button>
      <button class="btn-secondary" id="btn-cancel-card" style="padding:7px 12px;font-size:12px;">Cancel</button>
    </div>
  ` : `
    <button id="btn-add-card" style="margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:none;border:1px dashed #d4d4d4;border-radius:8px;padding:6px 12px;font-size:12px;color:#737373;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color 0.15s,color 0.15s;">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Add your own card
    </button>
  `;

  const unsortedHtml = `
    <div style="margin-bottom:20px;">
      <div style="font-size:12px;font-weight:500;color:#525252;margin-bottom:8px;">
        Unsorted cards (${state.cards.length})
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${state.cards.map(card => {
          if (card.custom && state.editingCardId === card.id) {
            return `
              <div style="display:flex;gap:5px;align-items:center;width:100%;max-width:360px;">
                <input class="edit-card-input" type="text" value="${escAttr(card.text)}" data-card-id="${card.id}"
                  style="flex:1;border:1.5px solid #1B6B5A;border-radius:8px;padding:6px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:#171717;background:#fff;" />
                <button class="btn-sm-green" data-save-card-edit="${card.id}" style="padding:6px 10px;font-size:11px;">Save</button>
                <button class="btn-secondary" data-cancel-card-edit="${card.id}" style="padding:6px 10px;font-size:11px;">Cancel</button>
              </div>`;
          }
          const actions = card.custom ? `
            <div style="display:flex;gap:3px;margin-left:4px;flex-shrink:0;">
              <button data-edit-card="${card.id}" title="Edit" style="background:none;border:none;cursor:pointer;padding:1px 3px;font-size:10px;color:#737373;border-radius:3px;line-height:1;" onmouseover="this.style.background='#e5e5e5'" onmouseout="this.style.background='none'">✎</button>
              <button data-delete-card="${card.id}" title="Delete" style="background:none;border:none;cursor:pointer;padding:1px 3px;font-size:10px;color:#737373;border-radius:3px;line-height:1;" onmouseover="this.style.background='#fee2e2';this.style.color='#dc2626'" onmouseout="this.style.background='none';this.style.color='#737373'">✕</button>
            </div>` : '';
          return `
            <div class="card-unsorted" draggable="${card.custom && state.editingCardId === card.id ? 'false' : 'true'}" data-card-id="${card.id}" style="display:flex;align-items:flex-start;gap:2px;max-width:${card.custom ? '280px' : '240px'};">
              <span style="flex:1;">${escHtml(card.text)}</span>
              ${actions}
            </div>`;
        }).join('')}
      </div>
      ${addCardForm}
    </div>
  `;

  const groupsHtml = state.groups.map(group => {
    const isEditing  = state.editingGroupId === group.id;
    const isCollapsed = group.collapsed;

    const headerContent = isEditing
      ? `<input class="group-name-input" type="text" value="${escAttr(group.name)}" data-group-id="${group.id}" />`
      : `<div class="group-name-display" data-edit-group="${group.id}">${escHtml(group.name)}</div>`;

    const cardsHtml = group.cards.length === 0
      ? `<span class="group-empty-hint">Drag cards here</span>`
      : group.cards.map(card => {
          if (card.custom && state.editingCardId === card.id) {
            return `
              <div style="display:flex;gap:5px;align-items:center;">
                <input class="edit-card-input" type="text" value="${escAttr(card.text)}" data-card-id="${card.id}"
                  style="flex:1;border:1.5px solid #1B6B5A;border-radius:8px;padding:5px 8px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:#171717;background:#fff;" />
                <button class="btn-sm-green" data-save-card-edit="${card.id}" style="padding:5px 8px;font-size:11px;">Save</button>
                <button class="btn-secondary" data-cancel-card-edit="${card.id}" style="padding:5px 8px;font-size:11px;">✕</button>
              </div>`;
          }
          const extraActions = card.custom ? `
            <button data-edit-card="${card.id}" title="Edit" style="background:none;border:none;cursor:pointer;padding:1px 3px;font-size:10px;color:#0F6E56;opacity:0.6;border-radius:3px;line-height:1;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">✎</button>
            <button data-delete-card="${card.id}" title="Delete" style="background:none;border:none;cursor:pointer;padding:1px 3px;font-size:10px;color:#dc2626;opacity:0.5;border-radius:3px;line-height:1;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">✕</button>` : `
            <button class="card-remove-btn" data-remove-card="${card.id}" title="Remove from group">✕</button>`;
          return `
            <div class="card-sorted" draggable="true" data-card-id="${card.id}" data-group-parent="${group.id}">
              <span style="flex:1;">${escHtml(card.text)}</span>
              ${extraActions}
            </div>`;
        }).join('');

    const chevron = isCollapsed
      ? `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    return `
      <div class="group-drop" data-group-id="${group.id}">
        <div class="group-header" draggable="true" data-drag-group="${group.id}">
          <span class="group-drag-handle" title="Drag to reorder">⠿</span>
          ${headerContent}
          <div class="group-meta">
            <span class="group-count">${group.cards.length} card${group.cards.length !== 1 ? 's' : ''}</span>
            <button class="group-collapse-btn" data-toggle-group="${group.id}" title="${isCollapsed ? 'Expand' : 'Collapse'}">${chevron}</button>
            <button class="group-delete-btn" data-delete-group="${group.id}" title="Remove group">✕</button>
          </div>
        </div>
        ${!isCollapsed ? `<div class="group-body" data-group-id="${group.id}">${cardsHtml}</div>` : ''}
      </div>
    `;
  }).join('');

  const emptyState = state.groups.length === 0
    ? `<div class="empty-state">Click "Add group" to create your first group, then drag cards into it.</div>`
    : '';

  return `
    <div style="padding-top:4px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#1B6B5A;font-weight:500;">Card sort</div>
          <div style="font-size:13px;color:#525252;margin-top:2px;">${totalPlaced} of ${CARDS_DATA.length} cards sorted · ${state.groups.length} group${state.groups.length !== 1 ? 's' : ''}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn-sm-green" id="btn-add-group">+ Add group</button>
          ${sorted ? `<button class="btn-sm-purple" id="btn-view-results">View results</button>` : ''}
          <button class="btn-export" id="btn-export">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M3.5 5.5l3 3 3-3M1.5 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Export
          </button>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%;"></div>
      </div>
      ${unsortedHtml}
      <div class="groups-grid">
        ${groupsHtml}
      </div>
      ${emptyState}
    </div>
  `;
}

// ── Events ─────────────────────────────────────────────────────────
function attachEvents() {
  // Intro
  const btnStart = document.getElementById('btn-start');
  if (btnStart) btnStart.addEventListener('click', () => { state.phase = 'sort'; render(); });

  // Results
  const btnReset = document.getElementById('btn-reset');
  if (btnReset) btnReset.addEventListener('click', () => {
    state.phase = 'intro';
    state.cards = shuffle(CARDS_DATA);
    state.groups = [];
    state.editingGroupId = null;
    state.addingCard = false;
    state.editingCardId = null;
    render();
  });

  // Sort phase
  const btnAdd = document.getElementById('btn-add-group');
  if (btnAdd) btnAdd.addEventListener('click', addGroup);

  // Add custom card
  const btnAddCard = document.getElementById('btn-add-card');
  if (btnAddCard) btnAddCard.addEventListener('click', () => { state.addingCard = true; render(); });

  const btnSaveCard = document.getElementById('btn-save-card');
  if (btnSaveCard) btnSaveCard.addEventListener('click', () => {
    const input = document.getElementById('new-card-input');
    if (input) addCustomCard(input.value);
  });

  const btnCancelCard = document.getElementById('btn-cancel-card');
  if (btnCancelCard) btnCancelCard.addEventListener('click', () => { state.addingCard = false; render(); });

  const newCardInput = document.getElementById('new-card-input');
  if (newCardInput) {
    newCardInput.focus();
    newCardInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addCustomCard(newCardInput.value);
      if (e.key === 'Escape') { state.addingCard = false; render(); }
    });
  }

  const btnResults = document.getElementById('btn-view-results');
  if (btnResults) btnResults.addEventListener('click', () => { state.phase = 'results'; render(); });

  // Export button
  const btnExport = document.getElementById('btn-export');
  if (btnExport) btnExport.addEventListener('click', exportAsImage);

  // Draggable cards (unsorted + sorted)
  document.querySelectorAll('[data-card-id][draggable]').forEach(el => {
    el.addEventListener('dragstart', (e) => {
      dragCardId = parseInt(el.dataset.cardId, 10);
      dragGroupId = null;
      dragOverCardId = null;
      el.classList.add('is-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
    });
    el.addEventListener('dragend', () => {
      document.querySelectorAll('.group-drop.drag-over').forEach(d => d.classList.remove('drag-over'));
      document.querySelectorAll('.card-sorted.drop-above,.card-sorted.drop-below').forEach(d => { d.classList.remove('drop-above'); d.classList.remove('drop-below'); });
      dragCardId = null;
      dragOverCardId = null;
      render();
    });

    // In-group card reorder: dragover on a sorted card
    if (el.dataset.groupParent) {
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const targetCardId = parseInt(el.dataset.cardId, 10);
        if (dragCardId === null || dragCardId === targetCardId) return;
        // Determine above/below based on mouse position
        const rect = el.getBoundingClientRect();
        const isAbove = e.clientY < rect.top + rect.height / 2;
        document.querySelectorAll('.card-sorted.drop-above,.card-sorted.drop-below').forEach(d => { d.classList.remove('drop-above'); d.classList.remove('drop-below'); });
        el.classList.add(isAbove ? 'drop-above' : 'drop-below');
        dragOverCardId = { cardId: targetCardId, above: isAbove };
      });

      el.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        document.querySelectorAll('.card-sorted.drop-above,.card-sorted.drop-below').forEach(d => { d.classList.remove('drop-above'); d.classList.remove('drop-below'); });
        const groupId = parseInt(el.dataset.groupParent, 10);
        const targetCardId = parseInt(el.dataset.cardId, 10);
        if (dragCardId !== null && dragCardId !== targetCardId) {
          // Check if dragging within same group
          const group = state.groups.find(g => g.id === groupId);
          const isInGroup = group && group.cards.some(c => c.id === dragCardId);
          if (isInGroup && dragOverCardId) {
            reorderCardInGroup(groupId, dragCardId, targetCardId);
          } else {
            moveCardToGroup(dragCardId, groupId);
          }
          dragCardId = null;
          dragOverCardId = null;
          render();
        }
      });
    }
  });

  // Group header drag (reorder groups)
  document.querySelectorAll('[data-drag-group]').forEach(el => {
    const groupId = parseInt(el.dataset.dragGroup, 10);
    el.addEventListener('dragstart', (e) => {
      if (e.target.closest('button') || e.target.closest('input')) { e.preventDefault(); return; }
      dragGroupId = groupId;
      dragCardId = null;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'group');
      setTimeout(() => {
        const groupEl = el.closest('.group-drop');
        if (groupEl) groupEl.classList.add('group-dragging');
      }, 0);
    });
    el.addEventListener('dragend', () => {
      document.querySelectorAll('.group-drop.group-dragging').forEach(d => d.classList.remove('group-dragging'));
      document.querySelectorAll('.group-drop.is-group-drag-over').forEach(d => d.classList.remove('is-group-drag-over'));
      dragGroupId = null;
      render();
    });
  });

  // Group drop zones
  document.querySelectorAll('.group-drop').forEach(el => {
    const groupId = parseInt(el.dataset.groupId, 10);

    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragGroupId !== null && dragGroupId !== groupId) {
        document.querySelectorAll('.group-drop.is-group-drag-over').forEach(d => { if (d !== el) d.classList.remove('is-group-drag-over'); });
        el.classList.add('is-group-drag-over');
      } else if (dragCardId !== null) {
        document.querySelectorAll('.group-drop.drag-over').forEach(d => { if (d !== el) d.classList.remove('drag-over'); });
        el.classList.add('drag-over');
      }
    });

    el.addEventListener('dragleave', (e) => {
      if (!el.contains(e.relatedTarget)) {
        el.classList.remove('drag-over');
        el.classList.remove('is-group-drag-over');
      }
    });

    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      el.classList.remove('is-group-drag-over');
      if (dragGroupId !== null && dragGroupId !== groupId) {
        reorderGroup(dragGroupId, groupId);
        dragGroupId = null;
        render();
      } else if (dragCardId !== null) {
        moveCardToGroup(dragCardId, groupId);
        dragCardId = null;
        render();
      }
    });
  });

  // Collapse toggle
  document.querySelectorAll('[data-toggle-group]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleGroupCollapse(parseInt(el.dataset.toggleGroup, 10));
    });
  });

  // Group name editing
  document.querySelectorAll('[data-edit-group]').forEach(el => {
    el.addEventListener('click', () => {
      state.editingGroupId = parseInt(el.dataset.editGroup, 10);
      render();
    });
  });

  // Group name input
  const nameInput = document.querySelector('.group-name-input');
  if (nameInput) {
    const gid = parseInt(nameInput.dataset.groupId, 10);
    nameInput.addEventListener('input', (e) => {
      renameGroup(gid, e.target.value);
    });
    nameInput.addEventListener('blur', () => {
      saveGroupName(gid);
    });
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveGroupName(gid);
      if (e.key === 'Escape') { state.editingGroupId = null; render(); }
    });
  }

  // Remove card from group
  document.querySelectorAll('[data-remove-card]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      moveCardBack(parseInt(el.dataset.removeCard, 10));
    });
  });

  // Edit custom card
  document.querySelectorAll('[data-edit-card]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      state.editingCardId = parseInt(el.dataset.editCard, 10);
      render();
    });
  });

  // Delete custom card
  document.querySelectorAll('[data-delete-card]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteCustomCard(parseInt(el.dataset.deleteCard, 10));
    });
  });

  // Save card edit
  document.querySelectorAll('[data-save-card-edit]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(el.dataset.saveCardEdit, 10);
      const input = document.querySelector(`.edit-card-input[data-card-id="${id}"]`);
      if (input) saveCardEdit(id, input.value);
    });
  });

  // Cancel card edit
  document.querySelectorAll('[data-cancel-card-edit]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      state.editingCardId = null;
      render();
    });
  });

  // Edit card input keyboard
  document.querySelectorAll('.edit-card-input').forEach(el => {
    const id = parseInt(el.dataset.cardId, 10);
    el.focus();
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveCardEdit(id, el.value);
      if (e.key === 'Escape') { state.editingCardId = null; render(); }
    });
  });

  // Delete group
  document.querySelectorAll('[data-delete-group]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      removeGroup(parseInt(el.dataset.deleteGroup, 10));
    });
  });
}

// ── Utilities ──────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escAttr(str) {
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Boot ───────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
